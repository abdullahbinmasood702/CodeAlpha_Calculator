<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calcura — Smart Calculator | CodeAlpha Task 2</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Scrolling image header -->
  <header class="marquee-header">
    <div class="marquee-track">
      <div class="marquee-group">
        <img src="https://picsum.photos/seed/calc1/300/200" alt="">
        <img src="https://picsum.photos/seed/calc2/300/200" alt="">
        <img src="https://picsum.photos/seed/calc3/300/200" alt="">
        <img src="https://picsum.photos/seed/calc4/300/200" alt="">
        <img src="https://picsum.photos/seed/calc5/300/200" alt="">
        <img src="https://picsum.photos/seed/calc6/300/200" alt="">
      </div>
      <div class="marquee-group" aria-hidden="true">
        <img src="https://picsum.photos/seed/calc1/300/200" alt="">
        <img src="https://picsum.photos/seed/calc2/300/200" alt="">
        <img src="https://picsum.photos/seed/calc3/300/200" alt="">
        <img src="https://picsum.photos/seed/calc4/300/200" alt="">
        <img src="https://picsum.photos/seed/calc5/300/200" alt="">
        <img src="https://picsum.photos/seed/calc6/300/200" alt="">
      </div>
    </div>
    <div class="marquee-overlay">
      <p class="eyebrow">CodeAlpha · Frontend Development Internship</p>
      <h1>Calc<span>ura</span></h1>
      <p class="tagline">A calculator with a keypad that clicks back.</p>
    </div>
  </header>

  <main class="stage">
    <section class="calculator" id="calculator">
      <div class="screen-well">
        <div class="expression" id="expression">&nbsp;</div>
        <div class="result" id="result">0</div>
      </div>

      <div class="keypad" id="keypad">
        <button class="key key-fn" data-action="clear">AC</button>
        <button class="key key-fn" data-action="negate">±</button>
        <button class="key key-fn" data-action="percent">%</button>
        <button class="key key-op" data-op="÷">÷</button>

        <button class="key key-num" data-num="7">7</button>
        <button class="key key-num" data-num="8">8</button>
        <button class="key key-num" data-num="9">9</button>
        <button class="key key-op" data-op="×">×</button>

        <button class="key key-num" data-num="4">4</button>
        <button class="key key-num" data-num="5">5</button>
        <button class="key key-num" data-num="6">6</button>
        <button class="key key-op" data-op="−">−</button>

        <button class="key key-num" data-num="1">1</button>
        <button class="key key-num" data-num="2">2</button>
        <button class="key key-num" data-num="3">3</button>
        <button class="key key-op" data-op="+">+</button>

        <button class="key key-num key-zero" data-num="0">0</button>
        <button class="key key-num" data-action="decimal">.</button>
        <button class="key key-eq" data-action="equals">=</button>
      </div>
    </section>

    <p class="hint">Keyboard works too — numbers, <kbd>+</kbd> <kbd>-</kbd> <kbd>*</kbd> <kbd>/</kbd>, <kbd>Enter</kbd>, <kbd>Esc</kbd></p>
  </main>

  <footer class="site-footer">
    <p>Built for CodeAlpha Frontend Development Internship — Task 2: Calculator</p>
  </footer>

<script src="script.js"></script>
</body>
</html>
